<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusConnect | Ultimate Student Hub</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700;800&display=swap" rel="stylesheet">
  
  <script src="https://maps.googleapis.com/maps/api/js?key=SUA_CHAVE_AQUI"></script>
  
  <style>
    :root {
      --primary: #6366f1;
      --accent: #10b981;
      --bg: #0b0e14;
      --glass: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
    body { background: var(--bg); color: #fff; line-height: 1.6; }

    /* Glassmorphism Reutilizável */
    .glass-card { 
      background: var(--glass); 
      backdrop-filter: blur(15px); 
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .container { max-width: 450px; margin: 0 auto; padding: 15px; }

    /* Auth Screen */
    #auth-screen { height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at top, #1e1b4b, #0b0e14); }
    .auth-container { width: 90%; max-width: 380px; text-align: center; }

    /* Header */
    .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 5px; }
    .header h1 { font-size: 1.4rem; font-weight: 800; letter-spacing: -1px; }
    .header span { color: var(--primary); }

    /* Inputs e Botões Estilizados */
    input { width: 100%; padding: 16px; border-radius: 16px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.3); color: white; margin-bottom: 12px; outline: none; transition: 0.3s; }
    input:focus { border-color: var(--primary); background: rgba(0,0,0,0.5); }
    
    .btn { width: 100%; padding: 16px; border-radius: 16px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 1rem; }
    .btn-primary { background: var(--primary); color: white; box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3); }
    .btn-secondary { background: transparent; color: white; border: 1px solid var(--glass-border); margin-top: 10px; }

    /* Map & Lists */
    #map { width: 100%; height: 200px; border-radius: 20px; margin-bottom: 15px; border: 1px solid var(--glass-border); }
    .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .price { font-weight: 800; color: var(--accent); }

    /* Transportes */
    .transport-tag { background: #3b82f6; padding: 4px 10px; border-radius: 10px; font-size: 11px; font-weight: 800; }

    /* Chat Real-Time */
    #chat-box { height: 250px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding: 5px; }
    .msg { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 0.9rem; }
    .msg.me { align-self: flex-end; background: var(--primary); border-bottom-right-radius: 4px; }
    .msg.them { align-self: flex-start; background: rgba(255,255,255,0.1); border-bottom-left-radius: 4px; }
    .msg-user { font-size: 10px; opacity: 0.5; margin-bottom: 4px; display: block; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="auth-screen">
    <div class="auth-container glass-card">
      <h1 style="margin-bottom: 10px;">Campus<span>Connect</span></h1>
      <p style="font-size: 0.8rem; opacity: 0.6; margin-bottom: 25px;">A tua vida universitária, organizada.</p>
      
      <input type="email" id="email" placeholder="Email institucional">
      <input type="password" id="password" placeholder="Palavra-passe">
      
      <button class="btn btn-primary" id="btn-login">Entrar</button>
      <button class="btn btn-secondary" id="btn-register">Criar conta nova</button>
      <div id="auth-error" style="color: #ef4444; font-size: 0.7rem; margin-top: 15px;"></div>
    </div>
  </div>

  <div id="main-app" class="hidden">
    <div class="container">
      <header class="header">
        <h1>Campus<span>Connect</span></h1>
        <button id="btn-logout" style="background:none; border:none; color:white; font-size: 1.2rem; cursor:pointer;">Logout</button>
      </header>

      <div class="glass-card" style="background: linear-gradient(135deg, #4338ca, #6366f1); border:none;">
        <h3 style="font-size: 0.9rem; margin-bottom: 5px;">⚡ Sugestão para Agora</h3>
        <p id="smart-tip" style="font-size: 0.85rem; font-weight: 500;">A carregar o teu estado...</p>
      </div>

      <div class="glass-card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
          <h3 style="font-size: 1rem;">📍 Alojamento & Estudo</h3>
          <span style="font-size: 10px; color: var(--accent); font-weight: 800;">LIVE MAP</span>
        </div>
        <div id="map"></div>
        <div id="rooms-list">
          </div>
      </div>

      <div class="glass-card">
        <h3 style="font-size: 1rem; margin-bottom: 15px;">🚌 Próximos Transportes</h3>
        <div class="list-item">
          <span>Autocarro 204 (Hosp. S. João)</span>
          <span class="transport-tag">3 MIN</span>
        </div>
        <div class="list-item">
          <span>Metro Linha D (Polo Univ.)</span>
          <span class="transport-tag" style="background: #10b981;">6 MIN</span>
        </div>
      </div>

      <div class="glass-card">
        <h3 style="font-size: 1rem; margin-bottom: 15px;">💬 Grupo de Estudo</h3>
        <div id="chat-box"></div>
        <div style="display:flex; gap:10px; margin-top:15px;">
          <input type="text" id="chat-input" placeholder="Diz algo..." style="margin-bottom:0;">
          <button id="btn-send" style="background: var(--primary); border:none; width: 60px; border-radius: 16px; color:white;">➔</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDNar96tviOoT6rjxWMO8B_T6gnvHNY-Dg",
      authDomain: "app3-73885.firebaseapp.com",
      projectId: "app3-73885",
      storageBucket: "app3-73885.firebasestorage.app",
      messagingSenderId: "313381846985",
      appId: "1:313381846985:web:a1ab6a75a245322499f218"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // --- SISTEMA DE LOGIN/REGISTO CORRIGIDO ---
    document.getElementById('btn-login').onclick = () => {
      const e = document.getElementById('email').value;
      const p = document.getElementById('password').value;
      signInWithEmailAndPassword(auth, e, p).catch(err => document.getElementById('auth-error').textContent = "Erro: Email ou senha incorretos.");
    };

    document.getElementById('btn-register').onclick = () => {
      const e = document.getElementById('email').value;
      const p = document.getElementById('password').value;
      createUserWithEmailAndPassword(auth, e, p).catch(err => document.getElementById('auth-error').textContent = "Erro: Escolhe uma senha com mais de 6 caracteres.");
    };

    document.getElementById('btn-logout').onclick = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
      if(user) {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        initModules();
      } else {
        document.getElementById('auth-screen').classList.remove('hidden');
        document.getElementById('main-app').classList.add('hidden');
      }
    });

    // --- MÓDULOS DO APP ---
    function initModules() {
      initMap();
      loadChat();
      loadRooms();
      updateSuggestions();
    }

    function initMap() {
      const porto = { lat: 41.1579, lng: -8.6291 };
      const map = new google.maps.Map(document.getElementById("map"), {
        center: porto, zoom: 14, disableDefaultUI: true,
        styles: [{ "stylers": [{ "hue": "#6366f1" }, { "saturation": -20 }, { "lightness": -20 }] }]
      });
      // Marcador da Universidade
      new google.maps.Marker({ position: porto, map, title: "FEUP / Polo Universitário" });
    }

    function loadChat() {
      const q = query(collection(db, "messages"), orderBy("createdAt", "asc"));
      onSnapshot(q, (snap) => {
        const box = document.getElementById('chat-box');
        box.innerHTML = '';
        snap.forEach(doc => {
          const m = doc.data();
          const isMe = m.uid === auth.currentUser.uid;
          box.innerHTML += `
            <div class="msg ${isMe ? 'me' : 'them'}">
              <span class="msg-user">${m.user}</span>
              ${m.text}
            </div>`;
        });
        box.scrollTop = box.scrollHeight;
      });
    }

    function loadRooms() {
      // Simulação de dados SerpApi/Firestore
      onSnapshot(collection(db, "rooms"), (snap) => {
        const list = document.getElementById('rooms-list');
        list.innerHTML = '';
        if(snap.empty) {
            list.innerHTML = '<p style="font-size:0.7rem; opacity:0.4; text-align:center;">Sem quartos listados. Adiciona no Firebase!</p>';
        }
        snap.forEach(doc => {
          const r = doc.data();
          list.innerHTML += `<div class="list-item"><span>${r.name}</span><span class="price">${r.price}€</span></div>`;
        });
      });
    }

    function updateSuggestions() {
      const h = new Date().getHours();
      const tip = document.getElementById('smart-tip');
      if(h < 12) tip.innerText = "🌅 Foco Matinal: A biblioteca central está calma. Excelente para rever apontamentos.";
      else if(h < 19) tip.innerText = "☕ Pausa para Café: Encontrámos 3 cafés com Wi-Fi perto do campus para o teu grupo.";
      else tip.innerText = "🌙 Descompressão: Hora de desligar. Não te esqueças do despertador para a aula das 09:00!";
    }

    document.getElementById('btn-send').onclick = async () => {
      const input = document.getElementById('chat-input');
      if(!input.value.trim()) return;
      await addDoc(collection(db, "messages"), {
        text: input.value,
        uid: auth.currentUser.uid,
        user: auth.currentUser.email.split('@')[0],
        createdAt: serverTimestamp()
      });
      input.value = '';
    };

  </script>
</body>
</html>
