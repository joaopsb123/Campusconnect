<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusConnect | Elite Edition</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700&display=swap" rel="stylesheet">
  <script src="https://maps.googleapis.com/maps/api/js?key=SUA_CHAVE_GOOGLE_MAPS"></script>
  
  <style>
    :root {
      --primary: #6366f1;
      --glass: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.12);
      --bg: #0f172a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
    body { background: var(--bg); color: white; background-attachment: fixed; }

    /* Efeito de Vidro (Glassmorphism) */
    .glass { 
      background: var(--glass); 
      backdrop-filter: blur(12px); 
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
    }

    .container { max-width: 480px; margin: 0 auto; padding: 20px; }

    /* Auth Screen */
    #auth-screen { height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at top right, #1e1b4b, #0f172a); }
    .auth-box { padding: 40px; width: 90%; text-align: center; }

    /* Header */
    .nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; }
    .nav h1 { font-size: 1.2rem; font-weight: 700; }
    .nav span { color: var(--primary); }

    /* Cards */
    .card { padding: 20px; margin-bottom: 20px; }
    .card-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; opacity: 0.9; }

    /* Inputs e Botões */
    input { width: 100%; padding: 14px; border-radius: 14px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white; margin-bottom: 12px; }
    .btn { width: 100%; padding: 14px; border-radius: 14px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; }
    .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4); }
    .btn-ghost { background: transparent; color: white; border: 1px solid var(--glass-border); margin-top: 8px; }

    /* Map & Lists */
    #map { width: 100%; height: 180px; border-radius: 18px; margin-bottom: 15px; }
    .list-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--glass-border); }
    
    /* Smart Suggestion */
    .suggestion-box { background: linear-gradient(90deg, #6366f1, #a855f7); padding: 15px; border-radius: 18px; margin-bottom: 20px; font-weight: 600; font-size: 0.85rem; }

    /* Chat UI Real-time */
    #chat-box { height: 250px; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
    .msg { max-width: 80%; padding: 12px; border-radius: 18px; font-size: 0.85rem; }
    .msg.me { align-self: flex-end; background: var(--primary); border-bottom-right-radius: 2px; }
    .msg.them { align-self: flex-start; background: rgba(255,255,255,0.1); border-bottom-left-radius: 2px; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="auth-screen">
    <div class="auth-box glass">
      <h1 style="margin-bottom: 10px;">Campus<span>Connect</span></h1>
      <p style="font-size: 0.8rem; opacity: 0.6; margin-bottom: 30px;">A tua conta académica premium</p>
      
      <input type="email" id="email" placeholder="Email Universitário">
      <input type="password" id="password" placeholder="Palavra-passe">
      
      <button class="btn btn-primary" id="btn-login">Entrar</button>
      <button class="btn btn-ghost" id="btn-register">Criar Conta Nova</button>
      <div id="auth-error" style="color: #ff4757; font-size: 0.7rem; margin-top: 15px;"></div>
    </div>
  </div>

  <div id="main-app" class="hidden">
    <div class="container">
      <div class="nav">
        <h1>Campus<span>Connect</span></h1>
        <button id="btn-logout" style="background:none; border:none; color:white; cursor:pointer;">Sair</button>
      </div>

      <div class="suggestion-box" id="smart-suggest">
        ✨ Carregando sugestão para o teu tempo livre...
      </div>

      <div class="card glass">
        <div class="card-title">🏠 Alojamento & Hotéis</div>
        <div id="map"></div>
        <div id="rooms-list">
          <p style="font-size: 0.7rem; opacity: 0.5; text-align: center;">À espera de dados do Apify...</p>
        </div>
      </div>

      <div class="card glass">
        <div class="card-title">⏰ Rotina & Despertador</div>
        <div id="routine-list">
          <div class="list-item"><span>09:00 - Aula de Redes</span><span style="color:var(--primary)">Pendente</span></div>
          <div class="list-item"><span>14:30 - Grupo de Estudo</span><span style="opacity:0.5">Agendado</span></div>
        </div>
      </div>

      <div class="card glass">
        <div class="card-title">👥 Chat Geral</div>
        <div id="chat-box"></div>
        <div style="display: flex; gap: 8px; margin-top: 15px;">
          <input type="text" id="chat-input" placeholder="Escreve aqui..." style="margin-bottom: 0;">
          <button id="btn-send" style="background: var(--primary); border:none; width: 50px; border-radius: 14px; color:white;">➔</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDNar96tviOoT6rjxWMO8B_T6gnvHNY-Dg",
      authDomain: "app3-73885.firebaseapp.com",
      projectId: "app3-73885",
      storageBucket: "app3-73885.firebasestorage.app",
      messagingSenderId: "313381846985",
      appId: "1:313381846985:web:a1ab6a75a245322499f218"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // --- SISTEMA DE LOGIN/REGISTO (FIXED) ---
    document.getElementById('btn-login').onclick = () => {
      const e = document.getElementById('email').value;
      const p = document.getElementById('password').value;
      signInWithEmailAndPassword(auth, e, p).catch(err => document.getElementById('auth-error').textContent = "Erro: Conta não encontrada.");
    };

    document.getElementById('btn-register').onclick = () => {
      const e = document.getElementById('email').value;
      const p = document.getElementById('password').value;
      createUserWithEmailAndPassword(auth, e, p).catch(err => document.getElementById('auth-error').textContent = "Erro ao criar conta (mínimo 6 caracteres).");
    };

    document.getElementById('btn-logout').onclick = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
      if(user) {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        initApp();
      } else {
        document.getElementById('auth-screen').classList.remove('hidden');
        document.getElementById('main-app').classList.add('hidden');
      }
    });

    // --- INICIALIZAÇÃO DE SISTEMAS ---
    function initApp() {
      initMap();
      loadRealTimeChat();
      loadRealTimeRooms();
      updateSmartSuggestions();
    }

    // MAPA (Google Maps)
    function initMap() {
      const mapDiv = document.getElementById("map");
      const porto = { lat: 41.1579, lng: -8.6291 };
      const map = new google.maps.Map(mapDiv, {
        center: porto, zoom: 14, disableDefaultUI: true,
        styles: [{ "stylers": [{ "hue": "#6366f1" }, { "saturation": -20 }, { "lightness": -20 }] }]
      });
      new google.maps.Marker({ position: porto, map, title: "Universidade" });
    }

    // CHAT REAL-TIME (CORRIGIDO)
    function loadRealTimeChat() {
      const q = query(collection(db, "messages"), orderBy("createdAt", "asc"));
      onSnapshot(q, (snap) => {
        const box = document.getElementById('chat-box');
        box.innerHTML = '';
        snap.forEach(doc => {
          const m = doc.data();
          const isMe = m.uid === auth.currentUser.uid;
          box.innerHTML += `<div class="msg ${isMe ? 'me' : 'them'}">${m.text}</div>`;
        });
        box.scrollTop = box.scrollHeight;
      });
    }

    // QUARTOS (FIRESTORE ALIMENTADO POR APIFY)
    function loadRealTimeRooms() {
      onSnapshot(collection(db, "rooms"), (snap) => {
        const list = document.getElementById('rooms-list');
        list.innerHTML = '';
        snap.forEach(doc => {
          const r = doc.data();
          list.innerHTML += `<div class="list-item"><span>${r.name}</span><span style="font-weight:700; color:var(--primary)">${r.price}€</span></div>`;
        });
      });
    }

    // SUGESTÃO INTELIGENTE
    function updateSmartSuggestions() {
      const hour = new Date().getHours();
      const s = document.getElementById('smart-suggest');
      if(hour < 12) s.innerHTML = "🌅 Foco matinal: A biblioteca central está com 20% de ocupação. Ideal para estudar!";
      else if(hour < 18) s.innerHTML = "☕ Pausa para café: Há um meetup de estudantes no bar do campus agora.";
      else s.innerHTML = "🌙 Noite: Revisa a tua rotina de amanhã e descansa!";
    }

    // ENVIO DE MENSAGEM
    document.getElementById('btn-send').onclick = async () => {
      const input = document.getElementById('chat-input');
      if(!input.value.trim()) return;
      await addDoc(collection(db, "messages"), {
        text: input.value,
        uid: auth.currentUser.uid,
        createdAt: serverTimestamp()
      });
      input.value = '';
    };

  </script>
</body>
</html>
