<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusConnect · App Universitária</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #f5f7fb; color: #1a1e2b; line-height: 1.5; }
    .top-bar { background: #ffffff; padding: 16px 20px; border-bottom: 1px solid #e9ecf2; position: sticky; top: 0; z-index: 10; }
    .top-bar h1 { font-size: 20px; font-weight: 600; color: #0b2b4f; }
    .top-bar span { color: #3b7cff; }
    .wrapper { max-width: 500px; margin: 0 auto; padding: 16px; }
    .card { background: #ffffff; border-radius: 16px; padding: 20px; margin-bottom: 20px; border: 1px solid #eef2f6; }
    .card h2 { font-size: 18px; font-weight: 600; margin-bottom: 16px; color: #141b2b; display: flex; align-items: center; gap: 8px; }
    input, select { width: 100%; padding: 12px 14px; border: 1px solid #d8dee9; border-radius: 12px; font-size: 15px; margin-bottom: 10px; }
    button { background: #0b2b4f; color: white; border: none; padding: 12px 16px; border-radius: 12px; font-size: 15px; font-weight: 500; width: 100%; cursor: pointer; }
    button.secondary { background: white; color: #0b2b4f; border: 1px solid #d8dee9; margin-top: 8px; }
    .auth-box { background: white; border-radius: 24px; padding: 32px 24px; margin-top: 40px; border: 1px solid #eef2f6; text-align: center; }
    .status { margin-top: 16px; padding: 12px; border-radius: 10px; font-size: 14px; display: none; }
    .status.error { background: #ffebee; color: #b71c1c; display: block; }
    .status.success { background: #e8f5e9; color: #1e5e2e; display: block; }
    .room-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f3f8; }
    .room-price { font-weight: 600; color: #3b7cff; }
    .transport-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f0f3f8; }
    .routine-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #f0f3f8; }
    .routine-time { background: #f0f4fe; padding: 4px 8px; border-radius: 8px; font-size: 13px; font-weight: 600; }
    .chat-message { background: #f8fafd; padding: 10px; border-radius: 12px; margin-bottom: 8px; }
    .chat-meta { font-size: 11px; color: #7c8ba0; margin-bottom: 2px; }
    .logout-btn { background: none; border: 1px solid #e0e6ed; color: #5b687c; padding: 8px 16px; width: auto; margin-bottom: 16px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="top-bar">
    <h1>🏛️ <span>Campus</span>Connect</h1>
  </div>

  <div class="wrapper">
    <div id="loginScreen">
      <div class="auth-box">
        <h3>Bem-vindo</h3>
        <p style="color: #5b687c; margin-bottom: 20px;">Acesse sua conta universitária</p>
        <input type="email" id="loginEmail" placeholder="E-mail" value="teste@uni.pt">
        <input type="password" id="loginPassword" placeholder="Senha" value="12345678">
        <button id="loginBtn">Entrar</button>
        <button class="secondary" id="registerBtn">Criar Conta</button>
        <div id="loginStatus" class="status"></div>
      </div>
    </div>

    <div id="appScreen" class="hidden">
      <button class="logout-btn" id="logoutBtn">← Sair</button>

      <div class="card">
        <h2>🏠 Quartos Disponíveis</h2>
        <div style="display: flex; gap: 8px;">
          <select id="roomFilter">
            <option value="all">Mais recentes</option>
            <option value="price">Menor preço</option>
          </select>
          <button id="addRoomBtn" style="width: 50px;">+</button>
        </div>
        
        <div id="addRoomForm" class="hidden" style="margin-top: 15px; padding: 15px; background: #f9fbff; border-radius: 12px;">
          <input type="text" id="roomTitle" placeholder="Ex: Quarto Individual Centro">
          <input type="number" id="roomPrice" placeholder="Preço (€)">
          <button id="saveRoomBtn">Publicar</button>
        </div>
        <div id="roomsContainer" style="margin-top: 10px;"></div>
      </div>

      <div class="card">
        <h2>🚌 Próximos Transportes</h2>
        <div id="transportContainer"></div>
      </div>

      <div class="card">
        <h2>⏰ Minha Rotina</h2>
        <div style="display: flex; gap: 8px;">
          <input type="text" id="routineDesc" placeholder="Aula/Tarefa" style="flex: 2;">
          <input type="time" id="routineTime" style="flex: 1;">
          <button id="addRoutineBtn" style="width: 50px;">+</button>
        </div>
        <div id="routineList"></div>
      </div>

      <div class="card">
        <h2>👥 Grupos de Estudo</h2>
        <select id="groupSelect">
          <option value="geral">Geral</option>
          <option value="exames">Preparação Exames</option>
        </select>
        <div id="chatMessages" style="max-height: 200px; overflow-y: auto; margin-bottom: 12px;"></div>
        <div style="display: flex; gap: 8px;">
          <input type="text" id="chatInput" placeholder="Mensagem..." style="margin-bottom: 0;">
          <button id="sendChatBtn" style="width: auto;">Enviar</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDNar96tviOoT6rjxWMO8B_T6gnvHNY-Dg",
      authDomain: "app3-73885.firebaseapp.com",
      projectId: "app3-73885",
      storageBucket: "app3-73885.firebasestorage.app",
      messagingSenderId: "313381846985",
      appId: "1:313381846985:web:a1ab6a75a245322499f218"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Seletores
    const loginStatus = document.getElementById('loginStatus');

    // --- AUTENTICAÇÃO ---
    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email = document.getElementById('loginEmail').value;
      const pass = document.getElementById('loginPassword').value;
      try {
        await signInWithEmailAndPassword(auth, email, pass);
      } catch (err) {
        loginStatus.textContent = "Erro: Usuário ou senha inválidos.";
        loginStatus.className = "status error";
      }
    });

    document.getElementById('registerBtn').addEventListener('click', async () => {
      const email = document.getElementById('loginEmail').value;
      const pass = document.getElementById('loginPassword').value;
      try {
        await createUserWithEmailAndPassword(auth, email, pass);
      } catch (err) {
        loginStatus.textContent = "Erro ao criar conta.";
        loginStatus.className = "status error";
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('appScreen').classList.remove('hidden');
        initApp();
      } else {
        document.getElementById('loginScreen').classList.remove('hidden');
        document.getElementById('appScreen').classList.add('hidden');
      }
    });

    // --- LÓGICA DO APP ---
    function initApp() {
      loadRooms();
      loadTransports();
      loadRoutine();
      loadChat();
    }

    // 1. Quartos
    function loadRooms() {
      const q = query(collection(db, 'rooms'), orderBy('createdAt', 'desc'));
      onSnapshot(q, (snap) => {
        const container = document.getElementById('roomsContainer');
        let html = '';
        snap.forEach(doc => {
          const r = doc.data();
          html += `<div class="room-item">
            <div><strong>${r.title}</strong></div>
            <div class="room-price">${r.price}€</div>
          </div>`;
        });
        container.innerHTML = html || '<p>Nenhum quarto disponível.</p>';
      });
    }

    document.getElementById('addRoomBtn').addEventListener('click', () => {
      document.getElementById('addRoomForm').classList.toggle('hidden');
    });

    document.getElementById('saveRoomBtn').addEventListener('click', async () => {
      const title = document.getElementById('roomTitle').value;
      const price = document.getElementById('roomPrice').value;
      if(!title || !price) return;
      await addDoc(collection(db, 'rooms'), {
        title, price: Number(price), createdAt: serverTimestamp()
      });
      document.getElementById('addRoomForm').classList.add('hidden');
    });

    // 2. Transportes (Estático para exemplo)
    function loadTransports() {
      const trans = [
        { n: 'Metro Linha Amarela', d: '4 min' },
        { n: 'Autocarro 736', d: '9 min' }
      ];
      document.getElementById('transportContainer').innerHTML = trans.map(t => 
        `<div class="transport-row"><span>${t.n}</span><strong>${t.d}</strong></div>`
      ).join('');
    }

    // 3. Rotina
    function loadRoutine() {
      const routines = JSON.parse(localStorage.getItem('uni_routines') || '[]');
      document.getElementById('routineList').innerHTML = routines.map(r => 
        `<div class="routine-item"><span class="routine-time">${r.time}</span><span>${r.desc}</span></div>`
      ).join('');
    }

    document.getElementById('addRoutineBtn').addEventListener('click', () => {
      const desc = document.getElementById('routineDesc').value;
      const time = document.getElementById('routineTime').value;
      if(!desc || !time) return;
      const routines = JSON.parse(localStorage.getItem('uni_routines') || '[]');
      routines.push({ desc, time });
      localStorage.setItem('uni_routines', JSON.stringify(routines));
      loadRoutine();
    });

    // 4. Chat
    function loadChat() {
      const q = query(collection(db, 'chat'), orderBy('timestamp', 'asc'));
      onSnapshot(q, (snap) => {
        const group = document.getElementById('groupSelect').value;
        const container = document.getElementById('chatMessages');
        let html = '';
        snap.forEach(doc => {
          const m = doc.data();
          if(m.group === group) {
            html += `<div class="chat-message">
              <div class="chat-meta">${m.user}</div>
              <div>${m.text}</div>
            </div>`;
          }
        });
        container.innerHTML = html;
        container.scrollTop = container.scrollHeight;
      });
    }

    document.getElementById('sendChatBtn').addEventListener('click', async () => {
      const text = document.getElementById('chatInput').value;
      if(!text) return;
      await addDoc(collection(db, 'chat'), {
        text,
        group: document.getElementById('groupSelect').value,
        user: auth.currentUser.email.split('@')[0],
        timestamp: serverTimestamp()
      });
      document.getElementById('chatInput').value = '';
    });

  </script>
</body>
</html>
