<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusConnect | Premium Student App</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #6366f1;
      --bg: #0f172a;
      --card: #1e293b;
      --text: #f8fafc;
      --accent: #10b981;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
    body { background: var(--bg); color: var(--text); line-height: 1.5; }

    /* Auth Design */
    #auth-screen { 
      height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
    }
    .auth-card { background: var(--card); padding: 40px; border-radius: 32px; width: 90%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); }

    /* App Layout */
    .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .container { max-width: 480px; margin: 0 auto; padding: 20px; }
    
    .card { background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.05); }
    
    input { width: 100%; padding: 16px; border-radius: 16px; border: none; background: #334155; color: white; margin-bottom: 12px; }
    .btn { width: 100%; padding: 16px; border-radius: 16px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 15px; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-outline { background: transparent; color: white; border: 1px solid #334155; margin-top: 10px; }
    .btn-google { background: white; color: #0f172a; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }

    /* Real-Time Chat */
    #chat-box { height: 250px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding: 5px; }
    .msg { max-width: 85%; padding: 12px 16px; border-radius: 20px; font-size: 14px; line-height: 1.4; }
    .msg.me { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
    .msg.them { align-self: flex-start; background: #334155; color: white; border-bottom-left-radius: 4px; }
    .msg-user { font-size: 10px; font-weight: 800; margin-bottom: 4px; display: block; opacity: 0.7; }

    /* Rooms/Hotels List */
    .room-item { display: flex; gap: 15px; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .room-price { color: var(--accent); font-weight: 800; font-size: 18px; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="auth-screen">
    <div class="auth-card">
      <h1 style="margin-bottom: 8px;">CampusConnect</h1>
      <p style="opacity: 0.6; margin-bottom: 24px; font-size: 14px;">Entra para veres os melhores quartos e grupos.</p>
      
      <input type="email" id="email" placeholder="teu@email.com">
      <input type="password" id="password" placeholder="Palavra-passe">
      
      <button class="btn btn-primary" id="btn-login">Entrar</button>
      <button class="btn btn-outline" id="btn-register">Criar conta nova</button>
      <button class="btn btn-google" id="btn-google">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18"> Google Login
      </button>
      <p id="auth-error" style="color: #fb7185; font-size: 12px; margin-top: 15px; text-align: center;"></p>
    </div>
  </div>

  <div id="main-app" class="hidden">
    <div class="header">
      <h2 style="font-size: 18px;">👋 <span id="user-display">Estudante</span></h2>
      <button id="btn-logout" style="background:none; border:none; font-size: 20px; cursor:pointer;">🚪</button>
    </div>

    <div class="container">
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
          <h3 style="font-size: 16px;">🏠 Melhores Quartos & Preços</h3>
          <span style="font-size: 10px; background: var(--accent); color: #064e3b; padding: 2px 8px; border-radius: 10px; font-weight: 800;">LIVE</span>
        </div>
        <div id="rooms-list">
          <p style="font-size: 12px; opacity: 0.5;">A procurar ofertas em tempo real...</p>
        </div>
      </div>

      <div class="card">
        <h3 style="margin-bottom: 15px; font-size: 16px;">👥 Chat do Campus</h3>
        <div id="chat-box"></div>
        <div style="display: flex; gap: 8px; margin-top: 15px;">
          <input type="text" id="chat-input" placeholder="Escreve algo..." style="margin-bottom: 0;">
          <button id="btn-send" style="background: var(--primary); color: white; border: none; width: 50px; border-radius: 16px; cursor: pointer;">➔</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // O teu Firebase (Mantive as tuas chaves)
    const firebaseConfig = {
      apiKey: "AIzaSyDNar96tviOoT6rjxWMO8B_T6gnvHNY-Dg",
      authDomain: "app3-73885.firebaseapp.com",
      projectId: "app3-73885",
      storageBucket: "app3-73885.firebasestorage.app",
      messagingSenderId: "313381846985",
      appId: "1:313381846985:web:a1ab6a75a245322499f218"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // --- AUTENTICAÇÃO CORRIGIDA ---
    const errorEl = document.getElementById('auth-error');

    document.getElementById('btn-login').onclick = () => {
      const e = document.getElementById('email').value;
      const p = document.getElementById('password').value;
      signInWithEmailAndPassword(auth, e, p).catch(err => errorEl.textContent = "Dados incorretos.");
    };

    document.getElementById('btn-register').onclick = () => {
      const e = document.getElementById('email').value;
      const p = document.getElementById('password').value;
      createUserWithEmailAndPassword(auth, e, p).catch(err => errorEl.textContent = "Erro ao registar: Senha deve ter 6+ dígitos.");
    };

    document.getElementById('btn-google').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('btn-logout').onclick = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        document.getElementById('user-display').textContent = user.displayName || user.email.split('@')[0];
        initRealTime();
      } else {
        document.getElementById('auth-screen').classList.remove('hidden');
        document.getElementById('main-app').classList.add('hidden');
      }
    });

    // --- LÓGICA TEMPO REAL (CHAT E QUARTOS) ---
    function initRealTime() {
      // CHAT INSTANTÂNEO
      const qChat = query(collection(db, "messages"), orderBy("createdAt", "asc"));
      onSnapshot(qChat, (snap) => {
        const box = document.getElementById('chat-box');
        box.innerHTML = '';
        snap.forEach(doc => {
          const m = doc.data();
          const isMe = m.uid === auth.currentUser.uid;
          box.innerHTML += `
            <div class="msg ${isMe ? 'me' : 'them'}">
              <span class="msg-user">${m.user}</span>
              ${m.text}
            </div>`;
        });
        box.scrollTop = box.scrollHeight;
      });

      // QUARTOS DO FIRESTORE (Podem ser alimentados pela APIFY)
      onSnapshot(collection(db, "rooms"), (snap) => {
        const list = document.getElementById('rooms-list');
        list.innerHTML = '';
        snap.forEach(doc => {
          const r = doc.data();
          list.innerHTML += `
            <div class="room-item">
              <div style="flex:1">
                <div style="font-weight:600">${r.name}</div>
                <div style="font-size:11px; opacity:0.6">📍 ${r.location}</div>
              </div>
              <div class="room-price">${r.price}€</div>
            </div>`;
        });
      });
    }

    // ENVIAR MENSAGEM (INSTANTÂNEO)
    document.getElementById('btn-send').onclick = async () => {
      const input = document.getElementById('chat-input');
      if(!input.value.trim()) return;
      
      await addDoc(collection(db, "messages"), {
        text: input.value,
        uid: auth.currentUser.uid,
        user: auth.currentUser.displayName || auth.currentUser.email.split('@')[0],
        createdAt: serverTimestamp()
      });
      input.value = '';
    };

  </script>
</body>
</html>
