<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusConnect | Premium Hub</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY"></script>
  
  <style>
    :root {
      --primary: #4f46e5;
      --surface: #ffffff;
      --body: #f8fafc;
      --text-main: #1e293b;
      --text-sub: #64748b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
    body { background: var(--body); color: var(--text-main); line-height: 1.6; }

    /* Glassmorphism Header */
    .header { 
        position: sticky; top: 0; z-index: 1000;
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px);
        padding: 16px 24px;
        display: flex; justify-content: space-between; align-items: center;
        border-bottom: 1px solid rgba(226, 232, 240, 0.5);
    }

    .container { max-width: 450px; margin: 0 auto; padding: 20px; }

    /* Dashboard Cards */
    .card { 
        background: var(--surface); border-radius: 24px; padding: 20px; 
        margin-bottom: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.04);
        border: 1px solid #f1f5f9;
    }

    .map-container { width: 100%; height: 200px; border-radius: 18px; margin-bottom: 15px; background: #e2e8f0; }

    /* Botões e Inputs */
    .btn { 
        width: 100%; padding: 14px; border-radius: 16px; border: none;
        font-weight: 700; cursor: pointer; transition: 0.3s;
        display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-google { background: white; border: 1px solid #e2e8f0; color: var(--text-main); }
    
    input { 
        width: 100%; padding: 12px 16px; border-radius: 14px; 
        border: 1px solid #e2e8f0; margin-bottom: 10px; background: #fcfdfe;
    }

    /* Listas e Itens */
    .item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f1f5f9; }
    .badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; background: #e0e7ff; color: #4338ca; }

    /* Chat Messages */
    #chat-window { height: 250px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
    .bubble { max-width: 80%; padding: 12px; border-radius: 18px; font-size: 14px; }
    .bubble.me { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
    .bubble.them { align-self: flex-start; background: #f1f5f9; border-bottom-left-radius: 4px; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div id="auth-screen">
    <div class="container" style="padding-top: 80px; text-align: center;">
        <h1 style="font-size: 32px; margin-bottom: 10px;">Campus<span>Connect</span></h1>
        <p style="color: var(--text-sub); margin-bottom: 40px;">A tua universidade no teu bolso.</p>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button class="btn btn-primary" id="login-btn">Entrar</button>
        <button class="btn btn-google" style="margin-top: 10px;" id="google-btn">Continuar com Google</button>
    </div>
</div>

<div id="app-screen" class="hidden">
    <header class="header">
        <div style="font-weight: 700; font-size: 18px;">Campus<span>Connect</span></div>
        <button id="logout" style="border:none; background:none; font-size: 20px; cursor:pointer;">📥</button>
    </header>

    <div class="container">
        <div class="card">
            <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                <h3 style="font-size: 16px;">📍 Quartos & Hotéis</h3>
                <span style="color: var(--primary); font-size: 12px; font-weight: 700;">LIVE MAP</span>
            </div>
            <div id="map" class="map-container"></div>
            <div id="rooms-list"></div>
        </div>

        <div class="card">
            <h3 style="font-size: 16px; margin-bottom: 15px;">📅 Próximo Evento</h3>
            <div id="routine-active" style="padding: 15px; background: #fdf2f8; border-radius: 16px; border-left: 4px solid #db2777;">
                <div style="font-weight: 700; color: #db2777;">09:00 - Aula de Programação</div>
                <p style="font-size: 12px; color: #9d174d;">Sala 204 • Falta 1h 15min</p>
            </div>
        </div>

        <div class="card">
            <h3 style="font-size: 16px; margin-bottom: 15px;">👥 Study Groups</h3>
            <div id="chat-window"></div>
            <div style="display: flex; gap: 8px; margin-top: 15px;">
                <input type="text" id="chat-input" placeholder="Diz algo..." style="margin-bottom:0;">
                <button id="send-btn" style="background: var(--primary); color:white; border:none; padding: 0 20px; border-radius: 14px;">➔</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDNar96tviOoT6rjxWMO8B_T6gnvHNY-Dg",
      authDomain: "app3-73885.firebaseapp.com",
      projectId: "app3-73885",
      storageBucket: "app3-73885.firebasestorage.app",
      messagingSenderId: "313381846985",
      appId: "1:313381846985:web:a1ab6a75a245322499f218"
    };

    const fb = initializeApp(firebaseConfig);
    const auth = getAuth(fb);
    const db = getFirestore(fb);
    const provider = new GoogleAuthProvider();

    // -- LOGIN GOOGLE --
    document.getElementById('google-btn').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('logout').onclick = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if(user) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            startLiveModules();
            initMap();
        } else {
            document.getElementById('auth-screen').classList.remove('hidden');
            document.getElementById('app-screen').classList.add('hidden');
        }
    });

    // -- GOOGLE MAPS --
    function initMap() {
        if (typeof google !== 'undefined') {
            const porto = { lat: 41.1579, lng: -8.6291 };
            const map = new google.maps.Map(document.getElementById("map"), { zoom: 14, center: porto, disableDefaultUI: true });
            // Exemplo de Pin de Quarto
            new google.maps.Marker({ position: { lat: 41.1600, lng: -8.6300 }, map, title: "Quarto Estudante" });
        }
    }

    // -- REAL-TIME ENGINE --
    function startLiveModules() {
        // Chat Real-time
        const qChat = query(collection(db, "chat"), orderBy("timestamp", "asc"));
        onSnapshot(qChat, (snap) => {
            const win = document.getElementById('chat-window');
            win.innerHTML = '';
            snap.forEach(doc => {
                const m = doc.data();
                const isMe = m.uid === auth.currentUser.uid;
                win.innerHTML += `<div class="bubble ${isMe ? 'me' : 'them'}">${m.text}</div>`;
            });
            win.scrollTop = win.scrollHeight;
        });

        // Quartos Real-time
        onSnapshot(collection(db, "rooms"), (snap) => {
            const list = document.getElementById('rooms-list');
            list.innerHTML = '';
            snap.forEach(doc => {
                const r = doc.data();
                list.innerHTML += `
                    <div class="item-row">
                        <div>
                            <div style="font-weight:700">${r.title}</div>
                            <div style="font-size:11px; color:var(--text-sub)">${r.dist || 'A pé'}</div>
                        </div>
                        <div class="badge">${r.price}€</div>
                    </div>`;
            });
        });
    }

    // -- ENVIO CHAT --
    document.getElementById('send-btn').onclick = async () => {
        const input = document.getElementById('chat-input');
        if(!input.value) return;
        await addDoc(collection(db, "chat"), {
            text: input.value,
            uid: auth.currentUser.uid,
            timestamp: serverTimestamp()
        });
        input.value = '';
    };

</script>
</body>
</html>
