<!DOCTYPE html><html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusConnect</title>  <style>
    body { font-family: Arial; background:#f4f4f4; margin:0; }
    header { background:#007bff; color:white; padding:15px; text-align:center; }
    .container { padding:15px; }
    input, button { width:100%; padding:10px; margin:5px 0; }
    button { background:#007bff; color:white; border:none; }
    .card { background:white; padding:10px; margin:10px 0; border-radius:10px; }
  </style></head>
<body><header>
  <h1>CampusConnect</h1>
</header><div class="container" id="auth">
  <h3>Login / Registo</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="register()">Registar</button>
  <button onclick="login()">Login</button>
  <p id="status"></p>
</div><div class="container" id="app" style="display:none;">
  <button onclick="logout()">Logout</button>  <div class="card">
    <h3>🏠 Quartos</h3>
    <input id="roomTitle" placeholder="Título do quarto">
    <input id="roomPrice" placeholder="Preço">
    <button onclick="addRoom()">Adicionar</button>
    <div id="rooms"></div>
  </div>  <div class="card">
    <h3>🚌 Transportes próximos</h3>
    <p>Metro mais próximo: 5 min</p>
    <p>Autocarro: 2 min</p>
  </div>  <div class="card">
    <h3>⏰ Rotina</h3>
    <input id="routine" placeholder="Ex: Aula 9h">
    <button onclick="saveRoutine()">Guardar</button>
    <p id="routineDisplay"></p>
  </div>  <div class="card">
    <h3>👥 Grupo de Estudo (chat simples)</h3>
    <input id="msg" placeholder="Mensagem">
    <button onclick="sendMsg()">Enviar</button>
    <div id="chat"></div>
  </div></div><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDNar96tviOoT6rjxWMO8B_T6gnvHNY-Dg",
  authDomain: "app3-73885.firebaseapp.com",
  projectId: "app3-73885",
  storageBucket: "app3-73885.firebasestorage.app",
  messagingSenderId: "313381846985",
  appId: "1:313381846985:web:a1ab6a75a245322499f218"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.register = () => {
  createUserWithEmailAndPassword(auth, email.value, password.value)
    .then(()=> status.innerText="Registado")
    .catch(e=> status.innerText=e.message);
}

window.login = () => {
  signInWithEmailAndPassword(auth, email.value, password.value)
    .then(()=> status.innerText="Logado")
    .catch(e=> status.innerText=e.message);
}

window.logout = () => signOut(auth);

onAuthStateChanged(auth, user => {
  if(user){
    auth.style.display='none';
    appDiv.style.display='block';
  }
});

const appDiv = document.getElementById('app');

// QUARTOS
window.addRoom = async () => {
  await addDoc(collection(db, "rooms"), {
    title: roomTitle.value,
    price: roomPrice.value
  });
}

onSnapshot(collection(db, "rooms"), snap => {
  rooms.innerHTML="";
  snap.forEach(doc => {
    const r = doc.data();
    rooms.innerHTML += `<p>${r.title} - ${r.price}€</p>`;
  });
});

// ROTINA
window.saveRoutine = () => {
  localStorage.setItem("routine", routine.value);
  routineDisplay.innerText = routine.value;
}

routineDisplay.innerText = localStorage.getItem("routine") || "";

// CHAT
window.sendMsg = async () => {
  await addDoc(collection(db, "chat"), {
    text: msg.value
  });
}

onSnapshot(collection(db, "chat"), snap => {
  chat.innerHTML="";
  snap.forEach(doc => {
    chat.innerHTML += `<p>${doc.data().text}</p>`;
  });
});

</script></body>
</html>
