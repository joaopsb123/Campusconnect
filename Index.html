<!DOCTYPE html><html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniRoom App</title>  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    #logoutBtn {
      background: red;
    }
  </style></head>
<body><div class="container">
  <h2>Login / Registo</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="register()">Registar</button>
  <button onclick="login()">Login</button>
  <button id="logoutBtn" onclick="logout()" style="display:none;">Logout</button>
  <p id="status"></p>
</div><script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDNar96tviOoT6rjxWMO8B_T6gnvHNY-Dg",
    authDomain: "app3-73885.firebaseapp.com",
    projectId: "app3-73885",
    storageBucket: "app3-73885.firebasestorage.app",
    messagingSenderId: "313381846985",
    appId: "1:313381846985:web:a1ab6a75a245322499f218",
    measurementId: "G-1JTBJVTXDF"
  };

  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const auth = getAuth(app);

  window.register = function () {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    createUserWithEmailAndPassword(auth, email, password)
      .then(() => {
        document.getElementById('status').innerText = "Registo feito!";
      })
      .catch(error => {
        document.getElementById('status').innerText = error.message;
      });
  }

  window.login = function () {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    signInWithEmailAndPassword(auth, email, password)
      .then(() => {
        document.getElementById('status').innerText = "Login com sucesso!";
        document.getElementById('logoutBtn').style.display = 'block';
      })
      .catch(error => {
        document.getElementById('status').innerText = error.message;
      });
  }

  window.logout = function () {
    signOut(auth).then(() => {
      document.getElementById('status').innerText = "Logout feito";
      document.getElementById('logoutBtn').style.display = 'none';
    });
  }

  onAuthStateChanged(auth, user => {
    if (user) {
      document.getElementById('status').innerText = "Utilizador logado: " + user.email;
      document.getElementById('logoutBtn').style.display = 'block';
    }
  });
</script></body>
  </html>
